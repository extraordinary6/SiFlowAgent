id: counter_basic
description: |
  Simple single-module 8-bit counter. All three tiers start with a preloaded
  spec summary so that the router tier (which does exactly one skill call) can
  still reach RTL generation.
preload_spec_text: |
  Module name: counter
  Inputs: clk, rst_n
  Outputs: cnt[7:0]
  Behavior: increments cnt on every rising edge of clk. rst_n is active low and
    synchronously drives cnt to 0 when asserted.
  Timing: sample inputs on rising edge of clk. rst_n is active low.
  Constraints: keep one output signal per always block.
goal: generate RTL from the current spec summary and be ready for review.
tiers:
  - router
  - agent
  - multi
checks:
  require_completed: true
  min_modules: 1
  lint:
    module_count_min: 1
    reset_missing_count_max: 0
    empty_always_count_max: 0
  contains_all:
    - "module counter"
    - "always @"
  not_contains:
    - "// TODO: implement top-level integration logic"
  max_llm_calls:
    router: 4
    agent: 14
    multi: 22
judge:
  enabled: true
  pass_threshold: 0.7
  criteria: |
    The generated Verilog describes a synthesizable 8-bit counter with clk,
    rst_n (active low), and an 8-bit output. The reset behavior is explicit
    and the counter increments on clk. Placeholder-only bodies (TODO only)
    should score below 0.4.
simulation:
  enabled: true
  testbench: harness/tb/counter_tb.v
  top_module: counter_tb
  tool: auto
  timeout_seconds: 20
  pass_tokens:
    - TEST_PASS
  fail_tokens:
    - TEST_FAIL
  # Fail loudly on machines without a simulator installed; flip to false
  # to have the sim step record "skipped" instead.
  require_tool: true
